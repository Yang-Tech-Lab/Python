name: Asset-Sentinel-CI-CD-Pipeline

# -------------------------------------------------------------------
# Trigger Configuration: Automated Polling & Manual Override
# -------------------------------------------------------------------
on:
  schedule:
    # Standard Cron Syntax: Runs at 00:00 UTC Daily (08:00 AM CST)
    # Ensures consistent "Green Wall" activity and market surveillance.
    - cron: '0 0 * * *'
  
  # Enables manual execution for ad-hoc debugging or real-time checks.
  workflow_dispatch:

# -------------------------------------------------------------------
# Jobs Definition: Cloud Environment Provisioning
# -------------------------------------------------------------------
jobs:
  monitor_task:
    name: Execute Sentinel Surveillance Protocol
    runs-on: ubuntu-latest  # High-performance virtual environment provided by GitHub

    steps:
      - name: 1. Initialize Workspace & Checkout Repository
        uses: actions/checkout@v3

      - name: 2. Provision Python Runtime (v3.9)
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          # Opting for cache: 'pip' can speed up repeated runs in the future
          # cache: 'pip'

      - name: 3. Deploy Dependency Environment
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas schedule
          # Using 'requirements.txt' is recommended for more complex portfolios

      - name: 4. Execute Sentinel Surveillance Script
        # Ensure the filename matches your actual Python script
        run: |
          python cloud_sentinel.py
        env:
          # If you eventually add real APIs, store keys in GitHub Secrets
          # API_KEY: ${{ secrets.FINANCE_API_KEY }}

      - name: 5. Finalize and Log Completion
        run: echo "Surveillance Cycle Successfully Completed at $(date)"
